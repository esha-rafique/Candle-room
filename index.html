<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#020408">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>The Candle Room</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#020408;position:fixed;top:0;left:0}
body{font-family:'Palatino Linotype',Palatino,Georgia,serif;touch-action:none}
#wrap{position:fixed;inset:0;cursor:grab;user-select:none;-webkit-user-select:none}
#wrap.grabbing{cursor:grabbing}
#cv{position:absolute;inset:0;width:100%!important;height:100%!important;display:block}
#ui-top{position:absolute;top:0;left:0;right:0;padding:env(safe-area-inset-top,16px) 20px 16px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:4}
#room-title{color:rgba(180,210,255,.18);font-size:11px;font-style:italic;letter-spacing:.22em;text-transform:uppercase}
#ccount{color:rgba(180,210,255,.18);font-size:11px;font-style:italic;letter-spacing:.08em}
#hint{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 88px);left:50%;transform:translateX(-50%);color:rgba(180,210,255,.2);font-size:10px;font-style:italic;letter-spacing:.07em;white-space:nowrap;pointer-events:none;z-index:4;transition:opacity .6s;text-align:center}
#tooltip{position:absolute;pointer-events:none;z-index:10;opacity:0;transition:opacity .25s;transform:translateX(-50%)}
#tip-inner{display:inline-block;background:rgba(4,6,14,.96);border:1px solid rgba(140,180,255,.15);border-radius:8px;padding:7px 14px;color:rgba(200,220,255,.88);font-size:13px;font-style:italic;white-space:nowrap;text-align:center}
#tip-inner span{display:block;font-size:11px;color:rgba(180,210,255,.3);margin-top:2px;letter-spacing:.05em}
#selui{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 86px);left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;gap:9px;z-index:5}
#sellabel{color:rgba(180,210,255,.28);font-size:11px;font-style:italic;letter-spacing:.07em;text-align:center;line-height:1.8;max-width:300px}
#lightbtn{background:rgba(100,130,200,.12);border:1px solid rgba(140,180,255,.28);color:rgba(200,225,255,.9);padding:11px 28px;border-radius:30px;font-family:inherit;font-size:13px;font-style:italic;cursor:pointer;letter-spacing:.06em;transition:all .2s;white-space:nowrap;pointer-events:all;display:flex;align-items:center;gap:8px}
#lightbtn:hover,#lightbtn:active{background:rgba(100,130,200,.25);color:#fff;border-color:rgba(140,180,255,.5)}
#backbtn{background:none;border:none;color:rgba(180,210,255,.2);font-family:inherit;font-size:11px;font-style:italic;cursor:pointer;letter-spacing:.06em;padding:4px;transition:color .2s;pointer-events:all}
#backbtn:hover{color:rgba(180,210,255,.5)}
#mbg{position:fixed;inset:0;background:rgba(1,3,8,.94);display:none;align-items:center;justify-content:center;z-index:20;padding:20px}
#mbox{background:#060b18;border:1px solid rgba(140,180,255,.12);border-radius:18px;padding:36px 30px;max-width:320px;width:100%;text-align:center}
#mbox h3{color:rgba(200,220,255,.85);font-size:20px;font-weight:400;font-style:italic;margin-bottom:10px;letter-spacing:.04em}
#mbox p{color:rgba(180,210,255,.22);font-size:13px;margin-bottom:24px;line-height:1.78;font-style:italic}
#ninp{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(140,180,255,.16);border-radius:8px;color:rgba(200,220,255,.9);font-family:inherit;font-style:italic;font-size:16px;padding:13px 14px;text-align:center;outline:none;margin-bottom:13px;transition:border-color .2s;display:block}
#ninp::placeholder{color:rgba(180,210,255,.14)}
#ninp:focus{border-color:rgba(140,180,255,.42)}
#cbtn{width:100%;background:rgba(100,130,200,.1);border:1px solid rgba(140,180,255,.22);color:rgba(200,225,255,.88);font-family:inherit;font-style:italic;font-size:14px;padding:13px;border-radius:8px;cursor:pointer;margin-bottom:10px;letter-spacing:.05em;transition:all .2s;display:block}
#cbtn:hover,#cbtn:active{background:rgba(100,130,200,.22);color:rgba(225,240,255,1)}
#xcbtn{background:none;border:none;color:rgba(180,210,255,.18);font-family:inherit;font-style:italic;font-size:11px;cursor:pointer;letter-spacing:.05em;display:block;width:100%;text-align:center;padding:4px;transition:color .2s}
#xcbtn:hover{color:rgba(180,210,255,.45)}
#dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:rgba(140,180,255,.55);opacity:0;transition:opacity .3s;flex-shrink:0}
#ldr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#020408;z-index:30;pointer-events:none;transition:opacity 1.2s}
#ldr-t{color:rgba(180,210,255,.16);font-size:13px;font-style:italic;letter-spacing:.14em}
#ldr-s{color:rgba(180,210,255,.08);font-size:11px;font-style:italic;letter-spacing:.08em}
/* D-pad */
#nav{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 14px);right:16px;z-index:6;display:grid;grid-template-columns:repeat(3,40px);grid-template-rows:repeat(3,40px);gap:3px}
.nb{width:40px;height:40px;border-radius:10px;background:rgba(10,18,36,.6);border:1px solid rgba(140,180,255,.18);color:rgba(180,210,255,.55);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
.nb:hover,.nb:active{background:rgba(30,50,90,.75);color:rgba(200,225,255,.95);border-color:rgba(140,180,255,.42)}
.nb.empty{background:none;border:none;cursor:default;pointer-events:none}
#nav-rotate{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 14px);left:16px;z-index:6;display:flex;gap:4px}
.rb{width:40px;height:40px;border-radius:10px;background:rgba(10,18,36,.6);border:1px solid rgba(140,180,255,.18);color:rgba(180,210,255,.55);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
.rb:hover,.rb:active{background:rgba(30,50,90,.75);color:rgba(200,225,255,.95);border-color:rgba(140,180,255,.42)}
/* Toast */
#toast{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(4,10,24,.9);border:1px solid rgba(140,180,255,.14);border-radius:20px;padding:8px 18px;color:rgba(200,220,255,.7);font-size:11px;font-style:italic;letter-spacing:.06em;pointer-events:none;z-index:15;opacity:0;transition:opacity .4s;white-space:nowrap}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="ui-top"><span id="room-title">The Candle Room</span><span id="ccount"></span></div>
  <div id="hint">tap a table or shelf · place a candle · hover a flame to read</div>
  <div id="tooltip"><div id="tip-inner">name<span>just now</span></div></div>
  <div id="toast"></div>

  <div id="selui">
    <span id="sellabel"></span>
    <button id="lightbtn">place a candle here <span id="dot"></span></button>
    <button id="backbtn">← keep looking</button>
  </div>

  <div id="nav">
    <div class="nb empty"></div>
    <div class="nb" id="nb-fwd">▲</div>
    <div class="nb empty"></div>
    <div class="nb" id="nb-left">◀</div>
    <div class="nb empty"></div>
    <div class="nb" id="nb-right">▶</div>
    <div class="nb empty"></div>
    <div class="nb" id="nb-back">▼</div>
    <div class="nb empty"></div>
  </div>
  <div id="nav-rotate">
    <div class="rb" id="rb-ccw">↺</div>
    <div class="rb" id="rb-cw">↻</div>
  </div>

  <div id="mbg">
    <div id="mbox">
      <h3>Who is this for?</h3>
      <p>A name. A soul. A memory.<br>Light a candle and let it rest here.</p>
      <input id="ninp" type="text" placeholder="their name…" maxlength="40">
      <button id="cbtn">Light the candle</button>
      <button id="xcbtn">go back</button>
    </div>
  </div>
  <div id="ldr"><div id="ldr-t">the chapel stirs in silence…</div><div id="ldr-s">kindling the eternal lights</div></div>
</div>

put(box(4,0.2,1.4,0x141E2A),0,0.1,-12.5);put(box(3.6,1.0,1.2,0x111A24),0,0.7,-12.5);put(box(4.2,0.12,1.6,0x1C2838),0,1.26,-12.5);

  put(box(bkW+0.1,0.07,0.54,0x1A2A14),0,bkH+0.05,0,g);put(box(bkW+0.1,0.07,0.54,0x1A2A14),0,0.04,0,g);
  const shelfYs=[0.55,1.1,1.65,2.2,2.72];const shelfMeshes=[];
  shelfYs.forEach(sy=>{const shelf=box(bkW,0.055,0.48,0x1A2A14);shelf.position.set(0,sy,0);g.add(shelf);shelfMeshes.push(shelf);});
  const bkC=[0x1A3A18,0x2A1810,0x181828,0x2A280A,0x0E1E28,0x281820,0x142818];
  shelfYs.forEach(sy=>{let bz=-0.72;for(let i=0;i<12+Math.floor(Math.random()*4);i++){if(bz>0.7)break;const bw2=0.06+Math.random()*0.07,bh2=0.2+Math.random()*0.22;const tilt=Math.random()>0.85;const bm=box(bw2,tilt?bw2*1.2:bh2,0.16,bkC[Math.floor(Math.random()*bkC.length)]);bm.position.set(bz+bw2/2,sy+bh2/2+0.03,0);if(tilt)bm.rotation.z=(Math.random()-0.5)*0.4;g.add(bm);bz+=bw2+0.01;}});
  shelfYs.forEach((sy,si)=>{
    const slots=[];

}

let ltCount=0;const allCandleMeshes=[];
// Track DB row IDs to prevent duplicate rendering
const renderedIds=new Set();

function addCandle(surfIdx,name,slotIdx,created,dbId){
  if(surfIdx<0||surfIdx>=placeableSurfaces.length)return;
  if(dbId&&renderedIds.has(dbId))return;
  if(dbId)renderedIds.add(dbId);
  const surf=placeableSurfaces[surfIdx];
  if(slotIdx<0||slotIdx>=surf.slots.length)slotIdx=surf.candles.length%surf.slots.length;
  const slot=surf.slots[slotIdx];const h=0.14+Math.random()*0.14;
  const cg=new THREE.Group();
  let wx,wz;
  if(surf.type==='table'){wx=surf.group.position.x+slot.localX;wz=surf.group.position.z+slot.localZ;}
  else{const cosR=Math.cos(surf.ry),sinR=Math.sin(surf.ry);wx=surf.group.position.x+slot.localX*cosR;wz=surf.group.position.z+slot.localX*sinR;}
  cg.position.set(wx,surf.group.position.y+surf.localY+h/2+0.01,wz);
  const bM=new THREE.MeshLambertMaterial({color:new THREE.Color().setHSL(0.08+Math.random()*0.05,0.06,0.78+Math.random()*0.14)});
  const body=mesh(new THREE.CylinderGeometry(0.024,0.034,h,7),bM);body.userData={isCandle:true,name,created:created||Date.now(),surfIdx,slotIdx};cg.add(body);allCandleMeshes.push(body);
  if(Math.random()>.4){const dr=mesh(new THREE.SphereGeometry(0.012,5,4),new THREE.MeshLambertMaterial({color:0xCCBA88}));dr.position.set(0.022,-h*0.13,0);dr.scale.y=1.9;cg.add(dr);}
  const wk=mesh(new THREE.CylinderGeometry(0.0025,0.0025,0.02,4),M(0x100808));wk.position.y=h/2+0.009;cg.add(wk);
  const fl=new THREE.Mesh(new THREE.SphereGeometry(0.017,5,4),new THREE.MeshBasicMaterial({color:0xFFCC60}));fl.position.y=h/2+0.038;fl.scale.y=2.5;fl.userData={isCandle:true,name,created:created||Date.now(),surfIdx,slotIdx};cg.add(fl);allCandleMeshes.push(fl);
  const fc=new THREE.Mesh(new THREE.SphereGeometry(0.007,4,3),new THREE.MeshBasicMaterial({color:0xFFEECC}));fc.position.y=h/2+0.033;cg.add(fc);
  if(ltCount<40){const pl=new THREE.PointLight(0xFF9040,0.45,2.2);pl.position.y=h/2+0.1;cg.add(pl);ltCount++;}
  scene.add(cg);
  surf.candles.push({name,created:created||Date.now(),slotIdx,flame:fl,core:fc,mesh:cg});
  return cg;
}

function getNDC(cx,cy){return{x:(cx/W)*2-1,y:-(cy/H)*2+1};}

function getMeshSurfIdx(obj){if(obj&&obj.userData.surfIdx!==undefined)return obj.userData.surfIdx;for(let i=0;i<placeableSurfaces.length;i++)if(placeableSurfaces[i].meshRef===obj)return i;return -1;}

function doHover(cx,cy){
  if(isDrag)return;
  const{x,y}=getNDC(cx,cy);rc.setFromCamera({x,y},cam);
  const ch=rc.intersectObjects(allCandleMeshes);
  if(ch.length&&ch[0].object.userData.isCandle){showTip(ch[0].object.userData.name,ch[0].object.userData.created,cx,cy);wrap.style.cursor='pointer';return;}
  hideTip();
  const pm=rc.intersectObjects(allPickMeshes);
  if(pm.length){
    const idx=allPickMeshes.indexOf(pm[0].object);
    if(hovSurf!==idx){if(hovSurf!==null&&hovSurf!==selSurf&&allPickMeshes[hovSurf]&&allPickMeshes[hovSurf].material.emissive)allPickMeshes[hovSurf].material.emissive.setHex(0);hovSurf=idx;if(idx!==selSurf&&allPickMeshes[idx]&&allPickMeshes[idx].material.emissive)allPickMeshes[idx].material.emissive.setHex(0x0A1020);}wrap.style.cursor='pointer';
  }else{if(hovSurf!==null&&hovSurf!==selSurf&&allPickMeshes[hovSurf]&&allPickMeshes[hovSurf].material.emissive)allPickMeshes[hovSurf].material.emissive.setHex(0);hovSurf=null;wrap.style.cursor=isDrag?'grabbing':'grab';}
}
function doClick(cx,cy){
  const{x,y}=getNDC(cx,cy);rc.setFromCamera({x,y},cam);
  const ch=rc.intersectObjects(allCandleMeshes);if(ch.length&&ch[0].object.userData.isCandle)return;
  const pm=rc.intersectObjects(allPickMeshes);
  if(pm.length){const si=getMeshSurfIdx(pm[0].object);if(si>=0)selectSurf(si);}else deselectSurf();
}
function selectSurf(si){
  if(selSurf!==null&&placeableSurfaces[selSurf]&&placeableSurfaces[selSurf].meshRef.material.emissive)placeableSurfaces[selSurf].meshRef.material.emissive.setHex(0);
  selSurf=si;const s=placeableSurfaces[si];const cnt=s.candles.length;
  document.getElementById('sellabel').textContent=s.name+'\u00a0\u00b7\u00a0'+(cnt?cnt+' candle'+(cnt>1?'s':'')+' here':'empty');
  document.getElementById('selui').style.display='flex';document.getElementById('hint').style.opacity='0';
  const gx=s.group.position.x,gz=s.group.position.z;const dx=camCX-gx,dz=camCZ-gz,len=Math.sqrt(dx*dx+dz*dz)||1;
  camTX=gx+(dx/len)*3.5;camTZ=gz+(dz/len)*3.5;yaw=Math.atan2(gx-camTX,-(gz-camTZ));pitch=s.type==='shelf'?-0.05:-0.12;
}
function deselectSurf(){
  if(selSurf!==null&&placeableSurfaces[selSurf]&&placeableSurfaces[selSurf].meshRef.material.emissive)placeableSurfaces[selSurf].meshRef.material.emissive.setHex(0);

// ── DATABASE ───────────────────────────────────────────
async function saveCandle(surfIdx,name,slotIdx){
  if(useDB){
    try{
      await sb.from('candles').insert({name,surf_idx:surfIdx,slot_idx:slotIdx});
    }catch(e){localSave();showToast('saved locally — db unavailable');}
  }else{localSave();}
}

async function loadCandles(){
  if(useDB){
    try{
      const cutoff=new Date(Date.now()-MAX_AGE).toISOString();
      const{data,error}=await sb.from('candles').select('*').gte('created_at',cutoff).order('created_at',{ascending:true});
      if(error)throw error;
      (data||[]).forEach(c=>addCandle(c.surf_idx,c.name,c.slot_idx,new Date(c.created_at).getTime(),c.id));
      return;
    }catch(e){console.warn('DB failed, using localStorage',e);}
  }
  // localStorage fallback
  try{const raw=localStorage.getItem('candle_room_v4');if(raw){const now=Date.now();JSON.parse(raw).filter(c=>now-c.created<MAX_AGE).forEach(c=>addCandle(c.si,c.name,c.slotIdx||0,c.created,null));}}catch(e){}
}

function localSave(){
  try{const all=[];const now=Date.now();placeableSurfaces.forEach((s,si)=>s.candles.forEach(c=>{if(now-c.created<MAX_AGE)all.push({si,name:c.name,created:c.created,slotIdx:c.slotIdx});}));localStorage.setItem('candle_room_v4',JSON.stringify(all));}catch(e){}
}

function updateCount(){let n=0;placeableSurfaces.forEach(s=>n+=s.candles.length);document.getElementById('ccount').textContent=n?(n===1?'1 light burning':n+' lights burning'):'';}

// ── REALTIME SUBSCRIPTION ──────────────────────────────
function subscribeRealtime(){
  if(!useDB)return;
  sb.channel('candles-room')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'candles'},payload=>{
      const c=payload.new;
      addCandle(c.surf_idx,c.name,c.slot_idx,new Date(c.created_at).getTime(),c.id);
      updateCount();
      showToast('a new candle was just lit for '+c.name);
    })
    .subscribe();
}

// ── ANIMATION ──────────────────────────────────────────
let T=0;const SPEED=0.065,ROT_SPEED=0.025;
function animate(){
  requestAnimationFrame(animate);T+=0.016;
  const fwd=navState.fwd||keys['w']||keys['arrowup'];
  const back=navState.back||keys['s']||keys['arrowdown'];
  const left=navState.left||keys['a']||keys['arrowleft'];
  const right=navState.right||keys['d']||keys['arrowright'];
  const ccw=navState.ccw||keys['q'];const cw=navState.cw||keys['e'];
  if(ccw)yaw+=ROT_SPEED;if(cw)yaw-=ROT_SPEED;
  const fwdX=Math.sin(yaw),fwdZ=-Math.cos(yaw),stX=Math.cos(yaw),stZ=Math.sin(yaw);
  if(fwd){camTX+=fwdX*SPEED;camTZ+=fwdZ*SPEED;}
  if(back){camTX-=fwdX*SPEED;camTZ-=fwdZ*SPEED;}
  if(left){camTX-=stX*SPEED;camTZ-=stZ*SPEED;}
  if(right){camTX+=stX*SPEED;camTZ+=stZ*SPEED;}
  camTX=Math.max(-12,Math.min(12,camTX));camTZ=Math.max(-12,Math.min(7,camTZ));
  camCX+=(camTX-camCX)*0.1;camCZ+=(camTZ-camCZ)*0.1;
  cam.position.set(camCX,1.7,camCZ);
  const cx=Math.sin(yaw)*Math.cos(pitch),cy=Math.sin(pitch),cz=-Math.cos(yaw)*Math.cos(pitch);
  cam.lookAt(camCX+cx*10,1.7+cy*10,camCZ+cz*10);
  placeableSurfaces.forEach((s,si)=>s.candles.forEach((c,ci)=>{
    if(!c.flame)return;
    const f1=Math.sin(T*8.7+si*4.1+ci*2.9),f2=Math.sin(T*13.1+si*2.3+ci*6.1);
    const fk=1+f1*0.13+f2*0.07;c.flame.scale.set(fk,2.5*fk,fk);
    c.flame.material.color.setHSL(0.1+f1*0.02,0.9,0.58+f2*0.1);
    if(c.core)c.core.material.color.setHSL(0.14,0.5,0.88+f1*0.07);
  }));
  chandLights.forEach((l,i)=>{l.intensity=0.28+Math.sin(T*2.1+i*2.4)*0.05+Math.sin(T*7.3+i)*0.03;});
  moonBeams.forEach((l,i)=>{l.intensity=0.5+Math.sin(T*0.18+i*0.9)*0.04;});
  wisps.forEach((w,i)=>{const t2=T*0.25+i*1.7;w.orb.position.y=0.38+Math.sin(T*0.85+i*2.3)*0.14;w.orb.position.x=w.ox+Math.sin(t2)*0.18;w.orb.position.z=w.oz+Math.cos(t2*0.72)*0.14;w.light.position.copy(w.orb.position);w.light.intensity=0.10+Math.sin(T*1.4+i*3.1)*0.06;});
  renderer.render(scene,cam);
}

loadCandles().then(()=>{
  subscribeRealtime();
  const ldr=document.getElementById('ldr');ldr.style.opacity='0';
  setTimeout(()=>ldr.style.display='none',1000);
  updateCount();animate();
});
</script>
